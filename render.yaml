services:
  - type: web
    name: ps04-dv-support
    runtime: python
    runtimeVersion: 3.11
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn dv_support.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DEBUG
        value: false
      - key: RENDER
        value: true
    plan: free
    healthCheckPath: /
    maxInstances: 1
